# Fluent-bit values for GCP — ships pod logs to Cloud Logging.
# Pair with observability-fluent-bit-cloudlogging module outputs
# (gsa_email); annotate the SA with iam.gke.io/gcp-service-account.

image:
  repository: cr.fluentbit.io/fluent/fluent-bit
  tag: "3.1.10"

serviceAccount:
  create: true
  name: fluent-bit
  annotations:
    iam.gke.io/gcp-service-account: ""

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "256Mi"

kind: DaemonSet

config:
  service: |
    [SERVICE]
        Daemon Off
        Flush 5
        Log_Level info
        Parsers_File /fluent-bit/etc/parsers.conf
        HTTP_Server On
        HTTP_Listen 0.0.0.0
        HTTP_Port 2020
        Health_Check On

  inputs: |
    [INPUT]
        Name tail
        Path /var/log/containers/*.log
        multiline.parser docker, cri
        Tag kube.*
        Mem_Buf_Limit 50MB
        Skip_Long_Lines On

  filters: |
    [FILTER]
        Name kubernetes
        Match kube.*
        Merge_Log On
        Keep_Log Off
        K8S-Logging.Parser On
        K8S-Logging.Exclude On
        Labels On
    [FILTER]
        Name modify
        Match kube.*
        Add cluster_name ${CLUSTER_NAME}
        Add astrolift.dev/org ${ASTROLIFT_ORG}

  outputs: |
    [OUTPUT]
        Name stackdriver
        Match kube.*
        google_service_credentials /var/run/secrets/google/credentials.json
        resource k8s_container
        k8s_cluster_name ${CLUSTER_NAME}
        k8s_cluster_location ${GCP_REGION}
        labels_key labels
        workers 2

env:
  - name: CLUSTER_NAME
    value: ""
  - name: GCP_REGION
    value: ""
  - name: ASTROLIFT_ORG
    value: ""
