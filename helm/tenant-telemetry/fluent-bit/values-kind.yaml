# Fluent-bit values for kind / dev — ships pod logs to in-cluster Loki.
# Loki is provisioned by the astrolift-prereqs umbrella chart; the
# default service is loki.observability.svc.cluster.local:3100.

image:
  repository: cr.fluentbit.io/fluent/fluent-bit
  tag: "3.1.10"

serviceAccount:
  create: true
  name: fluent-bit

resources:
  requests:
    cpu: "50m"
    memory: "64Mi"
  limits:
    cpu: "250m"
    memory: "128Mi"

kind: DaemonSet

config:
  service: |
    [SERVICE]
        Daemon Off
        Flush 5
        Log_Level info
        Parsers_File /fluent-bit/etc/parsers.conf
        HTTP_Server On
        HTTP_Listen 0.0.0.0
        HTTP_Port 2020
        Health_Check On

  inputs: |
    [INPUT]
        Name tail
        Path /var/log/containers/*.log
        multiline.parser docker, cri
        Tag kube.*
        Mem_Buf_Limit 25MB
        Skip_Long_Lines On

  filters: |
    [FILTER]
        Name kubernetes
        Match kube.*
        Merge_Log On
        K8S-Logging.Parser On
        Labels On

  outputs: |
    [OUTPUT]
        Name loki
        Match kube.*
        host loki.observability.svc.cluster.local
        port 3100
        labels job=fluent-bit, namespace=$kubernetes['namespace_name'], pod=$kubernetes['pod_name']
        line_format key_value
