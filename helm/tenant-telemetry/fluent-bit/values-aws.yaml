# Fluent-bit values for AWS — ships pod logs to CloudWatch Logs.
# Pair with observability-fluent-bit module outputs (irsa_role_arn,
# log_group_name); annotate the SA with the IRSA role ARN.

image:
  repository: cr.fluentbit.io/fluent/fluent-bit
  tag: "3.1.10"

serviceAccount:
  create: true
  name: fluent-bit
  annotations:
    eks.amazonaws.com/role-arn: ""

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "256Mi"

# Run as DaemonSet — one pod per node tailing /var/log/containers.
kind: DaemonSet

config:
  service: |
    [SERVICE]
        Daemon Off
        Flush 5
        Log_Level info
        Parsers_File /fluent-bit/etc/parsers.conf
        HTTP_Server On
        HTTP_Listen 0.0.0.0
        HTTP_Port 2020
        Health_Check On

  inputs: |
    [INPUT]
        Name tail
        Path /var/log/containers/*.log
        multiline.parser docker, cri
        Tag kube.*
        Mem_Buf_Limit 50MB
        Skip_Long_Lines On

  filters: |
    [FILTER]
        Name kubernetes
        Match kube.*
        Merge_Log On
        Merge_Log_Trim On
        Keep_Log Off
        K8S-Logging.Parser On
        K8S-Logging.Exclude On
        Annotations Off
        Labels On
    [FILTER]
        Name modify
        Match kube.*
        Add cluster_name ${CLUSTER_NAME}
        Add astrolift.dev/org ${ASTROLIFT_ORG}

  outputs: |
    [OUTPUT]
        Name cloudwatch_logs
        Match kube.*
        region ${AWS_REGION}
        log_group_name ${LOG_GROUP_NAME}
        log_stream_prefix from-fluent-bit-
        auto_create_group On
        log_retention_days 30
        workers 4

env:
  - name: AWS_REGION
    value: ""
  - name: CLUSTER_NAME
    value: ""
  - name: LOG_GROUP_NAME
    value: ""
  - name: ASTROLIFT_ORG
    value: "" # populated per-cluster from astrolift-config; default empty for shared
