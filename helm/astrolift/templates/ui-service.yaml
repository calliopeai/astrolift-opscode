{{- if .Values.ui.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "astrolift.fullname" . }}-ui
  labels:
    {{- include "astrolift.labels" . | nindent 4 }}
    {{- include "astrolift.selectorLabels" (dict "root" . "component" "ui") | nindent 4 }}
spec:
  type: {{ .Values.ui.service.type }}
  ports:
    - port: {{ .Values.ui.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "astrolift.selectorLabels" (dict "root" . "component" "ui") | nindent 4 }}
{{- end }}
