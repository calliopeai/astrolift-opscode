{{- if .Values.status.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "astrolift.fullname" . }}-status
  labels:
    {{- include "astrolift.labels" . | nindent 4 }}
    {{- include "astrolift.selectorLabels" (dict "root" . "component" "status") | nindent 4 }}
spec:
  replicas: {{ .Values.status.replicaCount }}
  selector:
    matchLabels:
      {{- include "astrolift.selectorLabels" (dict "root" . "component" "status") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "astrolift.labels" . | nindent 8 }}
        {{- include "astrolift.selectorLabels" (dict "root" . "component" "status") | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "astrolift.serviceAccountName" . }}
      containers:
        - name: status
          image: "{{ .Values.status.image.repository }}:{{ .Values.status.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.status.image.pullPolicy | default .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.status.service.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            {{- toYaml .Values.status.resources | nindent 12 }}
          {{- if .Values.status.env }}
          env:
            {{- range $key, $value := .Values.status.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          {{- end }}
{{- end }}
