{{- /*
cert-manager ClusterIssuer for ACME (Let's Encrypt by default). Renders
only when both cert-manager subchart and the clusterIssuer block are
enabled — operators with a private CA leave clusterIssuer.enabled=false
and ship their own Issuer.
*/ -}}
{{- if and .Values.certManager.enabled .Values.clusterIssuer.enabled -}}
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .Values.clusterIssuer.name }}
  labels:
    {{- include "astrolift-prereqs.labels" . | nindent 4 }}
spec:
  acme:
    server: {{ .Values.clusterIssuer.acmeServer }}
    email: {{ required "clusterIssuer.email is required when clusterIssuer is enabled" .Values.clusterIssuer.email | quote }}
    privateKeySecretRef:
      name: {{ .Values.clusterIssuer.name }}-account-key
    solvers:
      - http01:
          ingress:
            class: {{ .Values.clusterIssuer.ingressClass }}
{{- end -}}
