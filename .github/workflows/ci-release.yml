# Heavy tier — runs on tag builds + manual dispatch only.
# Boots a kind cluster + localstack and exercises a slice of the
# infra to catch apply-time regressions that fmt/validate miss.
#
# kind smoke: full cluster baseline + astrolift chart install + sample
# workload Ready assertion. Targets the spec #11 <5-min budget by
# skipping the heavy observability + GitOps prereqs (argocd / loki /
# kube-prometheus-stack / fluent-bit) — those are validated by helm
# lint/template in ci-pr.yml, not by a live install. The kind smoke's
# job is to prove the cluster baseline + chart shape + Pod scheduling
# survive a fresh apply against a real API server.
#
# localstack: still workflow_dispatch-only — see issue #18 follow-ups.

name: opscode release ci

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      run_kind_smoke:
        description: "Run the kind cluster smoke test"
        type: boolean
        default: true
      run_localstack:
        description: "Run the localstack apply"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  kind-smoke:
    name: kind smoke (baseline + astrolift chart + sample workload)
    if: ${{ github.event_name == 'push' || inputs.run_kind_smoke }}
    runs-on: ubuntu-latest
    # Spec #11 target is <5min on a clean machine. The job timeout
    # gives 10min total headroom (kind boot ~1m, baseline install ~2-3m,
    # chart install + sample app ~1m, wait + diagnostics ~1m). If this
    # regresses past the timeout we want a hard fail rather than a
    # silently-slow gate — that's the whole point of the budget.
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: helm/kind-action@v1
        with:
          cluster_name: astrolift-ci
          wait: 3m

      - uses: azure/setup-helm@v4
        with:
          version: "v3.16.2"

      - name: cluster baseline (kubernetes/base/install.sh kind dev)
        # Use the official kind/dev install path the operator runbooks
        # point to (kubernetes/base/install.sh). Skip the heavy charts
        # (argocd / loki / kube-prometheus-stack / fluentBit / envoyGateway)
        # to fit the <5-min budget — those land via the umbrella prereqs
        # chart and are exercised in ci-pr.yml's helm lint+template tier.
        # What we keep: cert-manager (TLS for ingress), metrics-server
        # (kubectl top works), Gateway API CRDs (chart targets), external-
        # secrets (skipped automatically for kind profile). External-dns
        # + alb-controller are also auto-skipped on kind.
        run: |
          set -euo pipefail
          chmod +x kubernetes/base/install.sh
          ./kubernetes/base/install.sh kind dev \
            --skip argocd \
            --skip loki \
            --skip prometheus \
            --skip fluentBit \
            --skip envoyGateway

      - name: install astrolift chart
        # Override images to a public busy-box-ish image so chart
        # rendering + resource creation actually exercise the K8s API
        # path. Replicas=0 avoids ImagePullBackOff churn since the
        # real astrolift/{api,ui,worker,status} images aren't yet on a
        # public registry — the goal here is to prove the chart
        # *applies* against a live cluster, not that the platform pods
        # come up. Real-image Pod-Ready will land once images publish
        # to Docker Hub (tracked in STATUS.md).
        run: |
          set -euo pipefail
          helm install astrolift helm/astrolift \
            --set api.replicaCount=0 \
            --set ui.replicaCount=0 \
            --set worker.replicaCount=0 \
            --set status.replicaCount=0 \
            --set api.image.repository=public.ecr.aws/docker/library/nginx \
            --set api.image.tag=alpine \
            --set ui.image.repository=public.ecr.aws/docker/library/nginx \
            --set ui.image.tag=alpine \
            --set worker.image.repository=public.ecr.aws/docker/library/nginx \
            --set worker.image.tag=alpine \
            --set status.image.repository=public.ecr.aws/docker/library/nginx \
            --set status.image.tag=alpine \
            --wait --timeout 2m

      - name: deploy sample workload + assert Ready
        # The sample workload stands in for what the `astro` CLI will
        # register + deploy once the CLI release artifact + control-plane
        # images are public. Until then, a raw kubectl manifest proves
        # the same thing the issue asks for: cluster + baseline survives
        # a fresh apply, and a user workload can schedule + reach Ready.
        # Sample-app-via-astro-CLI is the follow-up; tracked in STATUS.md.
        run: |
          set -euo pipefail
          kubectl create namespace astrolift-sample
          cat <<'EOF' | kubectl apply -n astrolift-sample -f -
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: sample-app
            labels:
              app: sample-app
              astrolift.io/sample: "true"
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: sample-app
            template:
              metadata:
                labels:
                  app: sample-app
              spec:
                containers:
                  - name: app
                    image: public.ecr.aws/docker/library/nginx:alpine
                    ports:
                      - containerPort: 80
                    readinessProbe:
                      httpGet:
                        path: /
                        port: 80
                      initialDelaySeconds: 2
                      periodSeconds: 2
                    resources:
                      requests:
                        cpu: 10m
                        memory: 16Mi
                      limits:
                        cpu: 100m
                        memory: 64Mi
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: sample-app
          spec:
            selector:
              app: sample-app
            ports:
              - port: 80
                targetPort: 80
          EOF

          kubectl wait --namespace astrolift-sample \
            --for=condition=Available \
            --timeout=120s \
            deployment/sample-app

          kubectl wait --namespace astrolift-sample \
            --for=condition=Ready \
            --timeout=60s \
            pod -l app=sample-app

      - name: diagnostics
        if: always()
        run: |
          echo "::group::all pods"
          kubectl get pods -A -o wide || true
          echo "::endgroup::"

          echo "::group::astrolift chart resources"
          kubectl get deploy,svc,sa -l app.kubernetes.io/part-of=astrolift -A || true
          echo "::endgroup::"

          echo "::group::sample app describe"
          kubectl describe -n astrolift-sample deployment/sample-app || true
          kubectl describe -n astrolift-sample pod -l app=sample-app || true
          echo "::endgroup::"

          echo "::group::recent events"
          kubectl get events -A --sort-by=.lastTimestamp | tail -30 || true
          echo "::endgroup::"

  localstack-apply:
    name: localstack apply (aws subset)
    # workflow_dispatch-only — localstack stability across versions is a
    # real maintenance cost (per #18 body). Don't run on tag push; opt-in
    # via the run_localstack input when an operator wants to revalidate.
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_localstack }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      localstack:
        image: localstack/localstack:3
        ports:
          - 4566:4566
        env:
          # Scope services to the surface we apply against — keeps
          # localstack startup fast and the failure surface narrow.
          # s3 + dynamodb cover tf-backend; iam + sts back the provider's
          # account-id resolution path used by the modules below.
          SERVICES: s3,dynamodb,iam,sts
          # localstack-free; pro features (advanced KMS, EKS, RDS engine
          # internals) intentionally not exercised here.
          DEBUG: "0"
    env:
      # Provider auth: localstack accepts any non-empty creds. These are
      # not real AWS keys; the provider's STS validation is bypassed by
      # the skip_* flags in the override file below.
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
      AWS_REGION: us-east-1
    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.9"

      - name: wait for localstack ready
        run: |
          set -euo pipefail
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4566/_localstack/health >/dev/null 2>&1; then
              echo "localstack is ready"
              curl -s http://localhost:4566/_localstack/health
              echo
              exit 0
            fi
            echo "waiting for localstack ($i/30)..."
            sleep 2
          done
          echo "::error::localstack never became ready"
          curl -v http://localhost:4566/_localstack/health || true
          exit 1

      - name: apply aws/tf-backend against localstack
        # Strategy: copy the tf-backend root to a CI workdir, then drop
        # a *_override.tf file (Terraform's built-in override mechanic
        # https://developer.hashicorp.com/terraform/language/files/override)
        # that replaces the upstream `provider "aws"` block with a
        # localstack-pointing variant. This keeps the production root
        # source clean — no test-only conditionals shipped in main.tf.
        run: |
          set -euo pipefail
          mkdir -p /tmp/tf-backend-localstack
          cp aws/tf-backend/*.tf /tmp/tf-backend-localstack/

          cat > /tmp/tf-backend-localstack/localstack_override.tf <<'EOF'
          # Overrides aws/tf-backend/main.tf's `provider "aws"` block.
          # Terraform merges *_override.tf files over their primary file,
          # so this file's provider config wins.
          provider "aws" {
            region                      = "us-east-1"
            access_key                  = "test"
            secret_key                  = "test"
            skip_credentials_validation = true
            skip_metadata_api_check     = true
            skip_requesting_account_id  = true

            # Path-style required for localstack S3 (no virtual-host DNS).
            s3_use_path_style = true

            endpoints {
              s3       = "http://localhost:4566"
              dynamodb = "http://localhost:4566"
              iam      = "http://localhost:4566"
              sts      = "http://localhost:4566"
            }

            default_tags {
              tags = {
                Service   = "astrolift"
                ManagedBy = "terraform-localstack-ci"
                Component = "tf-backend"
              }
            }
          }
          EOF

          cd /tmp/tf-backend-localstack
          terraform init -input=false
          terraform validate
          # Plan first for a clean failure surface, then apply.
          terraform plan -input=false -out=tfplan
          terraform apply -input=false -auto-approve tfplan

      - name: verify tf-backend resources via aws CLI
        # Sanity-check the resources landed in localstack rather than
        # trust-but-verify terraform state alone. AWS CLI talks to
        # localstack via --endpoint-url; same path real operators use
        # for ad-hoc inspection.
        run: |
          set -euo pipefail
          aws --endpoint-url=http://localhost:4566 s3 ls
          aws --endpoint-url=http://localhost:4566 s3api list-buckets \
            --query 'Buckets[].Name'
          aws --endpoint-url=http://localhost:4566 dynamodb list-tables

      - name: apply aws/modules/tf-backend-bootstrap (module shape exercise)
        # Picks one of the smaller modules in aws/modules/ to exercise the
        # module-call shape against localstack. tf-backend-bootstrap is
        # the same S3+DynamoDB pattern packaged as a callable module —
        # validates that the module's outputs + variables + resource graph
        # apply cleanly. EKS/RDS/Aurora modules are intentionally skipped
        # (localstack-free doesn't model their internals deeply enough
        # to be a useful gate).
        run: |
          set -euo pipefail
          ls aws/modules/tf-backend-bootstrap/ || {
            echo "module tf-backend-bootstrap not found — skipping module-shape check"
            exit 0
          }

          mkdir -p /tmp/tf-bootstrap-localstack
          cat > /tmp/tf-bootstrap-localstack/main.tf <<EOF
          terraform {
            required_version = ">= 1.5"
            required_providers {
              aws = {
                source  = "hashicorp/aws"
                version = "~> 5.0"
              }
            }
          }

          provider "aws" {
            region                      = "us-east-1"
            access_key                  = "test"
            secret_key                  = "test"
            skip_credentials_validation = true
            skip_metadata_api_check     = true
            skip_requesting_account_id  = true
            s3_use_path_style           = true

            endpoints {
              s3       = "http://localhost:4566"
              dynamodb = "http://localhost:4566"
              iam      = "http://localhost:4566"
              sts      = "http://localhost:4566"
            }
          }

          module "bootstrap" {
            source       = "${{ github.workspace }}/aws/modules/tf-backend-bootstrap"
            project_name = "astrolift-ci"
          }
          EOF

          cd /tmp/tf-bootstrap-localstack
          terraform init -input=false
          terraform validate
          terraform plan -input=false -out=tfplan
          terraform apply -input=false -auto-approve tfplan

      - name: diagnostics
        if: always()
        run: |
          echo "::group::localstack health"
          curl -s http://localhost:4566/_localstack/health || true
          echo
          echo "::endgroup::"

          echo "::group::s3 buckets"
          aws --endpoint-url=http://localhost:4566 s3 ls || true
          echo "::endgroup::"

          echo "::group::dynamodb tables"
          aws --endpoint-url=http://localhost:4566 dynamodb list-tables || true
          echo "::endgroup::"
