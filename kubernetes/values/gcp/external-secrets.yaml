# External Secrets Operator — GCP
# Syncs secrets from Google Secret Manager into Kubernetes Secrets.

installCRDs: true

serviceAccount:
  create: true
  name: external-secrets
  annotations:
    iam.gke.io/gcp-service-account: "" # Set via --set for Workload Identity

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 128Mi
