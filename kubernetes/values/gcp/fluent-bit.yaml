# Fluent Bit — GCP
# CNCF standard log collector. Ships logs to Loki.
# https://docs.fluentbit.io/manual

config:
  outputs: |
    [OUTPUT]
        Name        loki
        Match       kube.*
        Host        loki.loki.svc.cluster.local
        Port        3100
        Labels      job=fluent-bit, namespace=$kubernetes['namespace_name'], pod=$kubernetes['pod_name']
        Auto_Kubernetes_Labels on

    [OUTPUT]
        Name        loki
        Match       host.*
        Host        loki.loki.svc.cluster.local
        Port        3100
        Labels      job=fluent-bit-node

  # Optional: also ship to Cloud Logging
  # [OUTPUT]
  #     Name        stackdriver
  #     Match       kube.*
  #     resource    k8s_container
  #     k8s_cluster_name ${CLUSTER_NAME}
  #     k8s_cluster_location ${REGION}

tolerations:
  - operator: Exists

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi
