# cert-manager — AWS
# TLS certificate automation via Let's Encrypt or ACM.

installCRDs: true

replicaCount: 1

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 128Mi

webhook:
  replicaCount: 1

cainjector:
  replicaCount: 1

# DNS01 solver for Route53 (optional — requires IRSA)
# Configure a ClusterIssuer after install:
#
# apiVersion: cert-manager.io/v1
# kind: ClusterIssuer
# metadata:
#   name: letsencrypt-prod
# spec:
#   acme:
#     server: https://acme-v02.api.letsencrypt.org/directory
#     email: ops@yourdomain.com
#     privateKeySecretRef:
#       name: letsencrypt-prod
#     solvers:
#       - dns01:
#           route53:
#             region: us-west-2
