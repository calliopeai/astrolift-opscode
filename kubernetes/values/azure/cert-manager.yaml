# cert-manager — Azure
# TLS certificate automation via Let's Encrypt.

installCRDs: true

replicaCount: 1

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 128Mi

# DNS01 solver for Azure DNS (optional — requires Workload Identity)
# Configure a ClusterIssuer after install:
#
# apiVersion: cert-manager.io/v1
# kind: ClusterIssuer
# metadata:
#   name: letsencrypt-prod
# spec:
#   acme:
#     server: https://acme-v02.api.letsencrypt.org/directory
#     email: ops@yourdomain.com
#     privateKeySecretRef:
#       name: letsencrypt-prod
#     solvers:
#       - dns01:
#           azureDNS:
#             subscriptionID: your-subscription-id
#             resourceGroupName: your-rg
#             hostedZoneName: yourdomain.com
