# External Secrets Operator — Azure
# Syncs secrets from Azure Key Vault into Kubernetes Secrets.

installCRDs: true

serviceAccount:
  create: true
  name: external-secrets
  annotations:
    azure.workload.identity/client-id: "" # Set via --set for Workload Identity

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 128Mi
